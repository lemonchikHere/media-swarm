niches:
  realestate:
    name: "Недвижимость"
    style_prompt: |
      Ты редактор телеграм-канала о недвижимости. Перепиши пост в нашем стиле:
      - Короткий цепляющий заголовок с эмодзи
      - 2-3 абзаца, факты и цифры выделяй жирным
      - В конце призыв к действию или вопрос аудитории
      - Тон: экспертный но дружелюбный
    sources:
      rss:
        # Telegram каналы через tg.i-c-a.su (публичный RSS-прокси)
        - https://tg.i-c-a.su/rss/domclick          # Домклик — 179k
        - https://tg.i-c-a.su/rss/realty_rbc        # РБК Недвижимость — 45k
        - https://tg.i-c-a.su/rss/cian_official     # Циан — 22k
        - https://tg.i-c-a.su/rss/irn_ru            # IRN.ru аналитика
        # Новостные RSS
        - https://www.mirkvartir.ru/rss/news/
        - https://www.vedomosti.ru/rss/articles
    publish_to:
      telegram:
        - channel_id: "@metry_dengi"
    post_interval_minutes: 120
    max_posts_per_day: 8

  ai_tech:
    name: "AI и технологии"
    style_prompt: |
      Ты редактор телеграм-канала об ИИ и технологиях. Перепиши пост в нашем стиле:
      - Заголовок с 🤖 или ⚡ или 🔥
      - Объяснение простым языком (для не-технарей)
      - Почему это важно прямо сейчас
      - Мнение: что это значит для будущего
      - Тон: энтузиаст, немного футурист
    sources:
      rss:
        # Telegram каналы через tg.i-c-a.su
        - https://tg.i-c-a.su/rss/ai_machinelearning_big_data  # 323k
        - https://tg.i-c-a.su/rss/opendatascience              # 41k ODS.ai
        - https://tg.i-c-a.su/rss/machinelearning_ru           # 18k ML RU
        - https://tg.i-c-a.su/rss/deeplearning_ru              # 3.5k GenAI
        # Западные новостные RSS
        - https://habr.com/ru/rss/hubs/artificial_intelligence/articles/
        - https://cnews.ru/inc/rss/news.xml
        - https://feeds.feedburner.com/venturebeat/SZYF
        - https://techcrunch.com/feed/
        - https://www.technologyreview.com/feed/
        - https://feeds.arstechnica.com/arstechnica/index
        - https://openai.com/news/rss.xml
    publish_to:
      telegram:
        - channel_id: "@ai_puls_ru"
    post_interval_minutes: 90
    max_posts_per_day: 10

  github_trending:
    name: "GitHub сегодня"
    persona: "github_trending_ru"
    style_prompt: ""
    sources:
      rss:
        - https://mshibanami.github.io/GitHubTrendingRSS/daily/all.xml
        - https://mshibanami.github.io/GitHubTrendingRSS/daily/python.xml
        - https://mshibanami.github.io/GitHubTrendingRSS/daily/typescript.xml
    publish_to:
