niches:
  realestate:
    name: "Недвижимость"
    style_prompt: |
      Ты редактор телеграм-канала о недвижимости. Перепиши пост в нашем стиле:
      - Короткий цепляющий заголовок с эмодзи
      - 2-3 абзаца, факты и цифры выделяй жирным
      - В конце призыв к действию или вопрос аудитории
      - Тон: экспертный но дружелюбный
    sources:
      telegram:
        - domclick          # 179k subscribers — Домклик
        - realty_rbc        # 45k — РБК Недвижимость
        - cian_official     # 22k — Циан
        - irn_ru            # 1.1k — IRN.ru аналитика
      rss:
        - https://www.mirkvartir.ru/rss/news/       # MirKvartir — 60 entries ✅
        - https://www.vedomosti.ru/rss/articles     # Ведомости — 200 entries ✅
    publish_to:
      telegram:
        - channel_id: "@my_realestate"   # TODO: replace with real channel
      vk:
        - group_id: "123456789"           # TODO: replace with real group
    post_interval_minutes: 120
    max_posts_per_day: 8

  ai_tech:
    name: "AI и технологии"
    style_prompt: |
      Ты редактор телеграм-канала об ИИ и технологиях. Перепиши пост в нашем стиле:
      - Заголовок с 🤖 или ⚡ или 🔥
      - Объяснение простым языком (для не-технарей)
      - Почему это важно прямо сейчас
      - Мнение: что это значит для будущего
      - Тон: энтузиаст, немного футурист
    sources:
      telegram:
        - ai_machinelearning_big_data   # 323k — Machinelearning
        - opendatascience               # 41k — ODS.ai Data Science
        - machinelearning_ru            # 18k — ML RU
        - deeplearning_ru               # 3.5k — Deep Learning / GenAI
      rss:
        # Russian
        - https://habr.com/ru/rss/hubs/artificial_intelligence/articles/  # ✅
        - https://cnews.ru/inc/rss/news.xml                               # ✅
        # Western (all verified working)
        - https://feeds.feedburner.com/venturebeat/SZYF                   # VentureBeat ✅
        - https://techcrunch.com/feed/                                     # TechCrunch ✅
        - https://www.technologyreview.com/feed/                           # MIT Tech Review ✅
        - https://feeds.arstechnica.com/arstechnica/index                  # Ars Technica ✅
        - https://openai.com/news/rss.xml                                  # OpenAI Blog ✅
    publish_to:
      telegram:
        - channel_id: "@my_aitech"     # TODO: replace with real channel
      vk:
        - group_id: "987654321"         # TODO: replace with real group
    post_interval_minutes: 90
    max_posts_per_day: 10
